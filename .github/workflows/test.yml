name: Tests

on:
  push:
    branches: [main, 'v*']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-14  # Apple Silicon — matches the build matrix
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run smoke tests
        run: pytest
