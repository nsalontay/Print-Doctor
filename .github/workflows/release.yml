name: Build Print Doctor (macOS)

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14   # Apple Silicon
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build]"

      - name: Build .app
        run: ./build_macos.sh

      - name: Rename artifact with arch
        run: |
          cd dist
          mv "Print Doctor.zip" "Print-Doctor-macOS-${{ matrix.arch }}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: print-doctor-${{ matrix.arch }}
          path: dist/Print-Doctor-macOS-${{ matrix.arch }}.zip

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          generate_release_notes: true
